<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lun (論)</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --bg-sidebar: #0f0f12;
      --bg-chat: #0c0c0f;
      --bg-bubble-user: #1e1b4b;
      --bg-bubble-ai: #18181b;
      --bg-elevated: #1c1c20;
      --border: #27272a;
      --border-subtle: #1f1f23;
      --text: #fafafa;
      --text-dim: #a1a1aa;
      --text-muted: #52525b;
      --kiro: #a78bfa;
      --claude: #fb923c;
      --copilot: #4ade80;
      --accent: #a78bfa;
      --radius: 14px;
      --sidebar-w: 280px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", -apple-system, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header .logo {
      font-size: 18px; font-weight: 800; letter-spacing: -0.03em;
    }
    .sidebar-header .logo span { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 6px; }
    .sidebar-header .tagline { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Sidebar sections */
    .sidebar-section {
      padding: 12px 12px 8px;
    }
    .sidebar-section-title {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 0 4px 6px;
    }

    /* Session list */
    .session-list {
      flex: 1; overflow-y: auto; padding: 4px 8px;
    }
    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .session-item {
      padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
      font-size: 12px;
    }
    .session-item:hover { background: var(--bg-elevated); }
    .session-item .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .meta { color: var(--text-muted); font-size: 10px; margin-top: 2px; }

    .new-session-btn {
      margin: 8px 12px; padding: 8px; border-radius: 8px;
      border: 1px dashed var(--border); background: transparent;
      color: var(--text-dim); font-size: 12px; cursor: pointer;
      text-align: center; font-family: inherit;
    }
    .new-session-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* Settings panel */
    .sidebar-settings {
      border-top: 1px solid var(--border);
      padding: 12px;
    }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 4px; font-size: 11px;
    }
    .setting-row label { color: var(--text-dim); }
    .setting-row select, .setting-row input {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px; color: var(--text);
      font-size: 11px; font-family: inherit; outline: none; max-width: 120px;
    }
    .setting-row select:focus, .setting-row input:focus { border-color: var(--accent); }

    /* Footer */
    .sidebar-footer {
      padding: 10px 16px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-footer a { color: var(--text-muted); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--text-dim); }

    /* ===== MAIN AREA ===== */
    .main-area {
      display: flex; flex-direction: column; overflow: hidden;
    }

    .main-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .main-header .info { font-size: 12px; color: var(--text-dim); }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.ready { background: var(--copilot); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
    .dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
    .dot.off { background: var(--text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Chat area */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 6px;
      background: var(--bg-chat);
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Messages */
    .msg-row { display: flex; gap: 10px; max-width: 680px; animation: fadeIn 0.2s ease; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.ai { align-self: flex-start; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    .avatar {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.kiro { background: rgba(167,139,250,0.15); color: var(--kiro); }
    .avatar.claude { background: rgba(251,146,60,0.15); color: var(--claude); }
    .avatar.copilot { background: rgba(74,222,128,0.15); color: var(--copilot); }
    .avatar.user { background: rgba(255,255,255,0.06); color: var(--text-muted); }

    .bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
    .bubble-meta { font-size: 10px; color: var(--text-muted); padding: 0 4px; display: flex; gap: 6px; }
    .bubble-meta .name { font-weight: 700; text-transform: uppercase; }
    .bubble-meta .name.kiro { color: var(--kiro); }
    .bubble-meta .name.claude { color: var(--claude); }
    .bubble-meta .name.copilot { color: var(--copilot); }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; line-height: 1.7; word-break: break-word; max-width: 540px;
    }
    .msg-row.user .bubble { background: var(--bg-bubble-user); border: 1px solid rgba(99,102,241,0.2); border-top-right-radius: 4px; }
    .msg-row.ai .bubble { background: var(--bg-bubble-ai); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .bubble strong { color: var(--text); }
    .bubble code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: "SF Mono", monospace; }
    .bubble a { color: #60a5fa; text-decoration: underline; }

    /* Typing */
    .typing { display: inline-flex; gap: 4px; padding: 10px 14px; background: var(--bg-bubble-ai); border: 1px solid var(--border); border-radius: var(--radius); border-top-left-radius: 4px; }
    .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: typingDot 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-2px)} }

    /* Input */
    .input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 680px; margin: 0 auto; }
    #user-input {
      flex: 1; background: var(--bg-bubble-ai); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px; color: var(--text);
      font-size: 13px; font-family: inherit; resize: none;
      min-height: 42px; max-height: 180px; line-height: 1.5; outline: none;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input:disabled { opacity: 0.3; }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 38px; height: 38px; border-radius: 10px; border: none;
      background: var(--accent); color: #000; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* Welcome */
    .welcome { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:var(--text-muted); }
    .welcome .big { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -0.04em; }
    .welcome p { font-size: 12px; max-width: 280px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Lun<span>v1.0.0</span></div>
      <div class="tagline">Multi-agent consensus for decisions</div>
    </div>

    <button class="new-session-btn" id="newSessionBtn">+ New Session</button>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Sessions</div>
    </div>
    <div class="session-list" id="sessionList">
      <div style="padding:12px;color:var(--text-muted);font-size:11px;text-align:center;">No sessions yet</div>
    </div>

    <div class="sidebar-settings">
      <div class="sidebar-section-title">Settings</div>
      <div class="setting-row">
        <label>Language</label>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="ja">日本語</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Kiro model</label>
        <input type="text" id="modelKiro" value="auto" placeholder="auto">
      </div>
      <div class="setting-row">
        <label>Claude model</label>
        <input type="text" id="modelClaude" value="sonnet" placeholder="sonnet">
      </div>
      <div class="setting-row">
        <label>Copilot model</label>
        <input type="text" id="modelCopilot" value="auto" placeholder="auto">
      </div>
    </div>

    <div class="sidebar-footer">
      <span>MIT License</span>
      <a href="https://github.com/soonsoon/lun" target="_blank">GitHub</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="main-header">
      <span class="info" id="headerInfo">All agents</span>
      <div class="dot off" id="statusDot"></div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <div class="big">Lun</div>
        <p>Ask multiple AI agents the same question and compare their perspectives.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ask something..." rows="1"></textarea>
        <button id="send-btn">↑</button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById("chatArea");
    const welcome = document.getElementById("welcome");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusDot = document.getElementById("statusDot");
    const headerInfo = document.getElementById("headerInfo");
    const sessionList = document.getElementById("sessionList");

    let ws = null;
    let isWaiting = false;
    let isComposing = false;

    const AGENTS = {
      kiro: { label: "Kiro", avatar: "K" },
      claude: { label: "Claude", avatar: "C" },
      copilot: { label: "Co", avatar: "Co" },
    };

    // ===== RENDERING =====
    function hideWelcome() { welcome.style.display = "none"; }

    function addUserMsg(text) {
      hideWelcome();
      const row = el("div", "msg-row user");
      row.innerHTML = `<div class="avatar user">Me</div><div class="bubble-wrap"><div class="bubble">${esc(text)}</div></div>`;
      chatArea.appendChild(row);
      scroll();
    }

    function addSystemMsg(text) {
      hideWelcome();
      const row = el("div", "msg-row ai");
      row.style.maxWidth = "100%";
      row.innerHTML = `<div style="padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);font-size:11px;color:var(--text-muted);font-style:italic;">${esc(text)}</div>`;
      chatArea.appendChild(row);
      scroll();
    }

    function addTyping(pid) {
      hideWelcome();
      if (document.getElementById(`typing-${pid}`)) return;
      const row = el("div", "msg-row ai");
      row.id = `typing-${pid}`;
      row.innerHTML = `<div class="avatar ${pid}">${AGENTS[pid]?.avatar||"?"}</div><div class="bubble-wrap"><div class="bubble-meta"><span class="name ${pid}">${AGENTS[pid]?.label||pid}</span></div><div class="typing"><span></span><span></span><span></span></div></div>`;
      chatArea.appendChild(row);
      scroll();
    }

    function addAiMsg(pid, text, elapsed) {
      const old = document.getElementById(`typing-${pid}`);
      if (old) old.remove();
      hideWelcome();
      const row = el("div", "msg-row ai");
      const time = elapsed ? `${elapsed}s` : "";
      const model = getModel(pid);
      row.innerHTML = `<div class="avatar ${pid}">${AGENTS[pid]?.avatar||"?"}</div><div class="bubble-wrap"><div class="bubble-meta"><span class="name ${pid}">${AGENTS[pid]?.label||pid}</span><span>${time}</span><span>${model}</span></div><div class="bubble">${md(text||"(no response)")}</div></div>`;
      chatArea.appendChild(row);
      scroll();
    }

    function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }
    function scroll() { chatArea.scrollTop = chatArea.scrollHeight; }
    function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function md(text) {
      return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/^### (.+)$/gm,'<strong>$1</strong>')
        .replace(/^## (.+)$/gm,'<strong>$1</strong>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
        .replace(/^- (.+)$/gm,'&bull; $1')
        .replace(/\n/g,'<br>');
    }

    function getModel(pid) {
      if (pid === "kiro") return document.getElementById("modelKiro").value || "auto";
      if (pid === "claude") return document.getElementById("modelClaude").value || "sonnet";
      if (pid === "copilot") return document.getElementById("modelCopilot").value || "auto";
      return "auto";
    }

    // ===== SESSIONS =====
    async function loadSessions() {
      try {
        const res = await fetch("/api/sessions");
        const data = await res.json();
        const sessions = data.sessions || [];
        if (!sessions.length) { sessionList.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:11px;text-align:center;">No sessions yet</div>'; return; }
        sessionList.innerHTML = "";
        for (const s of sessions) {
          const div = el("div", "session-item");
          const date = s.date ? new Date(s.date).toLocaleDateString("en", {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
          const prompt = s.firstPrompt || "(untitled)";
          div.innerHTML = `<div class="title">${esc(prompt)}</div><div class="meta">${date} · ${s.turns} turns</div>`;
          sessionList.appendChild(div);
        }
      } catch {}
    }

    // ===== WEBSOCKET =====
    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => { ws.send(JSON.stringify({ type: "start", provider: "all" })); };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case "ready":
            statusDot.className = "dot ready";
            headerInfo.textContent = "All agents ready";
            input.disabled = false; sendBtn.disabled = false; input.focus();
            break;
          case "thinking":
            for (const pid of Object.keys(AGENTS)) addTyping(pid);
            break;
          case "provider-thinking": addTyping(msg.provider); break;
          case "provider-response": addAiMsg(msg.provider, msg.text, msg.elapsed); break;
          case "system": addSystemMsg(msg.text); break;
          case "done":
            isWaiting = false; statusDot.className = "dot ready";
            input.disabled = false; sendBtn.disabled = false; input.focus();
            loadSessions();
            break;
          case "error":
            isWaiting = false; statusDot.className = "dot ready";
            input.disabled = false; sendBtn.disabled = false;
            break;
        }
      };
      ws.onclose = () => { statusDot.className = "dot off"; setTimeout(connect, 2000); };
    }

    // ===== INPUT =====
    function send() {
      if (isComposing || isWaiting) return;
      const text = input.value.trim();
      if (!text) return;
      addUserMsg(text);
      ws.send(JSON.stringify({ type: "message", text }));
      input.value = ""; input.style.height = "42px";
      isWaiting = true; input.disabled = true; sendBtn.disabled = true;
      statusDot.className = "dot loading";
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("compositionstart", () => { isComposing = true; });
    input.addEventListener("compositionend", () => { isComposing = false; });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey && !isComposing) { e.preventDefault(); send(); } });
    input.addEventListener("input", () => { input.style.height = "42px"; input.style.height = Math.min(input.scrollHeight, 180) + "px"; });

    document.getElementById("newSessionBtn").addEventListener("click", () => {
      chatArea.innerHTML = ""; welcome.style.display = "flex"; chatArea.appendChild(welcome);
      if (ws && ws.readyState === WebSocket.OPEN) { ws.close(); }
      connect();
    });

    // INIT
    connect();
    loadSessions();
  </script>
</body>
</html>
