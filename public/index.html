<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lun</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#09090b;--bg-side:#0f0f12;--bg-chat:#0c0c0f;--bg-bub-user:#1e1b4b;--bg-bub-ai:#18181b;--bg-el:#1c1c20;--border:#27272a;--text:#fafafa;--dim:#a1a1aa;--muted:#52525b;--kiro:#a78bfa;--claude:#fb923c;--copilot:#4ade80;--accent:#a78bfa;--r:14px;--side-w:280px}
    body{background:var(--bg);color:var(--text);font-family:"Pretendard",-apple-system,sans-serif;height:100vh;display:grid;grid-template-columns:var(--side-w) 1fr;overflow:hidden}

    .sidebar{background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .side-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
    .side-head .logo{font-size:16px;font-weight:800;letter-spacing:-0.03em}
    .side-head .logo span{color:var(--muted);font-weight:400;font-size:10px;margin-left:5px}
    .side-head .tag{font-size:10px;color:var(--muted);margin-top:3px}

    .new-btn{margin:8px 10px;padding:7px;border-radius:7px;border:1px dashed var(--border);background:transparent;color:var(--dim);font-size:11px;cursor:pointer;text-align:center;font-family:inherit}
    .new-btn:hover{border-color:var(--muted);color:var(--text)}

    .sec-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:10px 14px 4px}

    .sess-list{flex:1;overflow-y:auto;padding:2px 8px}
    .sess-list::-webkit-scrollbar{width:3px}
    .sess-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .sess-item{padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:1px;font-size:11px}
    .sess-item:hover{background:var(--bg-el)}
    .sess-item.active{background:var(--bg-el)}
    .sess-item .t{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sess-item .m{color:var(--muted);font-size:9px;margin-top:2px}

    .side-settings{border-top:1px solid var(--border);padding:10px 12px;overflow-y:auto;max-height:220px}
    .side-settings::-webkit-scrollbar{width:3px}
    .side-settings::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .s-row{display:flex;align-items:center;justify-content:space-between;padding:5px 2px;font-size:10px}
    .s-row label{color:var(--dim);min-width:60px}
    .s-row select,.s-row input{background:var(--bg-el);border:1px solid var(--border);border-radius:5px;padding:3px 6px;color:var(--text);font-size:10px;font-family:inherit;outline:none;max-width:140px;width:100%}
    .s-row select:focus,.s-row input:focus{border-color:var(--accent)}

    .side-foot{padding:8px 12px;border-top:1px solid var(--border);font-size:9px;color:var(--muted)}
    .side-foot a{color:var(--muted);text-decoration:none}
    .side-foot a:hover{color:var(--dim)}
    .path-row{font-size:9px;color:var(--muted);padding:4px 2px;word-break:break-all}

    .main{display:flex;flex-direction:column;overflow:hidden}
    .main-head{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .main-head .info{font-size:11px;color:var(--dim)}
    .dot{width:7px;height:7px;border-radius:50%}
    .dot.on{background:var(--copilot);box-shadow:0 0 5px rgba(74,222,128,0.4)}
    .dot.load{background:#fbbf24;animation:p 1s infinite}
    .dot.off{background:var(--muted)}
    @keyframes p{0%,100%{opacity:1}50%{opacity:0.3}}

    .chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:5px;background:var(--bg-chat)}
    .chat::-webkit-scrollbar{width:3px}
    .chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .row{display:flex;gap:9px;max-width:660px;animation:fi .2s ease}
    .row.u{align-self:flex-end;flex-direction:row-reverse}
    .row.a{align-self:flex-start}
    @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

    .av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;margin-top:2px}
    .av.kiro{background:rgba(167,139,250,0.15);color:var(--kiro)}
    .av.claude{background:rgba(251,146,60,0.15);color:var(--claude)}
    .av.copilot{background:rgba(74,222,128,0.15);color:var(--copilot)}
    .av.user{background:rgba(255,255,255,0.05);color:var(--muted)}

    .bw{display:flex;flex-direction:column;gap:1px}
    .bm{font-size:9px;color:var(--muted);padding:0 3px;display:flex;gap:5px}
    .bm .n{font-weight:700;text-transform:uppercase}
    .bm .n.kiro{color:var(--kiro)}.bm .n.claude{color:var(--claude)}.bm .n.copilot{color:var(--copilot)}

    .bub{padding:9px 12px;border-radius:var(--r);font-size:12px;line-height:1.7;word-break:break-word;max-width:520px}
    .row.u .bub{background:var(--bg-bub-user);border:1px solid rgba(99,102,241,0.2);border-top-right-radius:3px}
    .row.a .bub{background:var(--bg-bub-ai);border:1px solid var(--border);border-top-left-radius:3px}
    .bub strong{color:var(--text)}.bub code{background:rgba(255,255,255,0.05);padding:1px 4px;border-radius:3px;font-size:10px;font-family:"SF Mono",monospace}

    .sys-msg{align-self:center;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.02);border:1px solid var(--border);font-size:10px;color:var(--muted);font-style:italic}

    .typing{display:inline-flex;gap:3px;padding:9px 12px;background:var(--bg-bub-ai);border:1px solid var(--border);border-radius:var(--r);border-top-left-radius:3px}
    .typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes td{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}

    .input-area{padding:12px 18px 16px;border-top:1px solid var(--border);flex-shrink:0}
    .input-row{display:flex;gap:8px;align-items:flex-end;max-width:660px;margin:0 auto}
    #inp{flex:1;background:var(--bg-bub-ai);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:12px;font-family:inherit;resize:none;min-height:38px;max-height:160px;line-height:1.5;outline:none}
    #inp:focus{border-color:var(--accent)}
    #inp:disabled{opacity:.3}
    #inp::placeholder{color:var(--muted)}
    #snd{width:36px;height:36px;border-radius:9px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    #snd:disabled{opacity:.2;cursor:not-allowed}

    .welcome{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted)}
    .welcome .big{font-size:32px;font-weight:900;color:var(--text);letter-spacing:-0.04em}
    .welcome p{font-size:11px;max-width:260px;text-align:center;line-height:1.6}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="side-head">
      <div class="logo">Lun<span>v1.3.0</span></div>
      <div class="tag">Multi-agent consensus</div>
    </div>
    <button class="new-btn" id="newBtn">+ New Session</button>
    <div class="sec-title">Sessions</div>
    <div class="sess-list" id="sessList"></div>

    <div class="side-settings">
      <div class="sec-title">Models</div>
      <div class="s-row"><label>Kiro</label><select id="mKiro"></select></div>
      <div class="s-row"><label>Claude</label><select id="mClaude"></select></div>
      <div class="s-row"><label>Copilot</label><select id="mCopilot"></select></div>
      <div class="sec-title" style="margin-top:8px">Storage</div>
      <div class="path-row" id="storagePath">~/.lun/sessions/</div>
    </div>

    <div class="side-foot">
      <span>MIT</span> · <a href="https://github.com/soonsoon2/lun" target="_blank">GitHub</a>
    </div>
  </div>

  <div class="main">
    <div class="main-head">
      <span class="info" id="hInfo">Ready</span>
      <div class="dot off" id="dot"></div>
    </div>
    <div class="chat" id="chat">
      <div class="welcome" id="wel">
        <div class="big">Lun</div>
        <p>Ask multiple AI agents and compare their perspectives.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inp" placeholder="Ask something..." rows="1"></textarea>
        <button id="snd">↑</button>
      </div>
    </div>
  </div>

  <script>
    const chat=document.getElementById("chat"),wel=document.getElementById("wel"),inp=document.getElementById("inp"),snd=document.getElementById("snd"),dot=document.getElementById("dot"),hInfo=document.getElementById("hInfo"),sessList=document.getElementById("sessList"),storagePath=document.getElementById("storagePath");
    let ws=null,waiting=false,composing=false;
    const AG={kiro:{l:"Kiro",a:"K"},claude:{l:"Claude",a:"C"},copilot:{l:"Co",a:"Co"}};

    // === Render ===
    function hide(){wel.style.display="none"}
    function el(t,c){const e=document.createElement(t);e.className=c;return e}
    function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
    function md(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/^- (.+)$/gm,"&bull; $1").replace(/\n/g,"<br>")}
    function scroll(){chat.scrollTop=chat.scrollHeight}

    function addUser(t){hide();const r=el("div","row u");r.innerHTML=`<div class="av user">Me</div><div class="bw"><div class="bub">${esc(t)}</div></div>`;chat.appendChild(r);scroll()}
    function addAi(pid,text,elapsed){
      const old=document.getElementById(`ty-${pid}`);if(old)old.remove();hide();
      const r=el("div","row a");const time=elapsed?`${elapsed}s`:"";
      r.innerHTML=`<div class="av ${pid}">${AG[pid]?.a||"?"}</div><div class="bw"><div class="bm"><span class="n ${pid}">${AG[pid]?.l||pid}</span><span>${time}</span></div><div class="bub">${md(text||"(no response)")}</div></div>`;
      chat.appendChild(r);scroll();
    }
    function addTyping(pid){hide();if(document.getElementById(`ty-${pid}`))return;const r=el("div","row a");r.id=`ty-${pid}`;r.innerHTML=`<div class="av ${pid}">${AG[pid]?.a||"?"}</div><div class="bw"><div class="bm"><span class="n ${pid}">${AG[pid]?.l||pid}</span></div><div class="typing"><span></span><span></span><span></span></div></div>`;chat.appendChild(r);scroll()}
    function addSys(t){hide();const d=el("div","sys-msg");d.textContent=t;chat.appendChild(d);scroll()}

    // === Sessions ===
    async function loadSessions(){
      try{
        const r=await fetch("/api/sessions");const d=await r.json();
        storagePath.textContent=d.path||"~/.lun/sessions/";
        const ss=d.sessions||[];
        if(!ss.length){sessList.innerHTML='<div style="padding:10px;color:var(--muted);font-size:10px;text-align:center">No sessions</div>';return}
        sessList.innerHTML="";
        for(const s of ss){
          const div=el("div","sess-item");
          const date=s.date?new Date(s.date).toLocaleDateString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
          div.innerHTML=`<div class="t">${esc(s.firstPrompt||"(untitled)")}</div><div class="m">${date} · ${s.turns} turns</div>`;
          div.addEventListener("click",()=>openSession(s.id));
          sessList.appendChild(div);
        }
      }catch{}
    }

    async function openSession(id){
      try{
        const r=await fetch(`/api/sessions/${encodeURIComponent(id)}`);
        const d=await r.json();
        if(d.error)return;
        chat.innerHTML="";hide();
        for(const turn of (d.turns||[])){
          addUser(turn.prompt||"");
          for(const res of (turn.results||[])){
            addAi(res.provider,res.text,res.elapsed);
          }
        }
        hInfo.textContent=`Session: ${id}`;
      }catch{}
    }

    // === Models ===
    async function loadModels(){
      try{
        const r=await fetch("/api/provider-models");const d=await r.json();
        for(const[pid,models]of Object.entries(d.models||{})){
          const sel=document.getElementById(`m${pid.charAt(0).toUpperCase()+pid.slice(1)}`);
          if(!sel)continue;
          sel.innerHTML="";
          for(const m of models){
            if(m.id==="__custom__")continue;
            const opt=document.createElement("option");opt.value=m.id;opt.textContent=m.label;sel.appendChild(opt);
          }
        }
      }catch{}
    }

    // === WebSocket ===
    function connect(){
      const proto=location.protocol==="https:"?"wss:":"ws:";
      ws=new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen=()=>{ws.send(JSON.stringify({type:"start",provider:"all"}))};
      ws.onmessage=(e)=>{
        const msg=JSON.parse(e.data);
        switch(msg.type){
          case"ready":dot.className="dot on";hInfo.textContent="All agents ready";inp.disabled=false;snd.disabled=false;inp.focus();break;
          case"thinking":for(const p of Object.keys(AG))addTyping(p);break;
          case"provider-thinking":addTyping(msg.provider);break;
          case"provider-response":addAi(msg.provider,msg.text,msg.elapsed);break;
          case"system":addSys(msg.text);break;
          case"done":waiting=false;dot.className="dot on";inp.disabled=false;snd.disabled=false;inp.focus();loadSessions();break;
          case"error":waiting=false;dot.className="dot on";inp.disabled=false;snd.disabled=false;break;
        }
      };
      ws.onclose=()=>{dot.className="dot off";setTimeout(connect,2000)};
    }

    // === Input ===
    function send(){
      if(composing||waiting)return;const t=inp.value.trim();if(!t)return;
      addUser(t);ws.send(JSON.stringify({type:"message",text:t}));
      inp.value="";inp.style.height="38px";waiting=true;inp.disabled=true;snd.disabled=true;dot.className="dot load";
    }
    snd.addEventListener("click",send);
    inp.addEventListener("compositionstart",()=>{composing=true});
    inp.addEventListener("compositionend",()=>{composing=false});
    inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey&&!composing){e.preventDefault();send()}});
    inp.addEventListener("input",()=>{inp.style.height="38px";inp.style.height=Math.min(inp.scrollHeight,160)+"px"});
    document.getElementById("newBtn").addEventListener("click",()=>{chat.innerHTML="";wel.style.display="flex";chat.appendChild(wel);hInfo.textContent="Ready";if(ws&&ws.readyState===1)ws.close();connect()});

    // Init
    connect();loadSessions();loadModels();
  </script>
</body>
</html>
