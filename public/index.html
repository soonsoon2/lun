<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lun</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--side:#0f0f12;--chat:#0b0b0e;--el:#18181b;--el2:#1c1c20;--border:#27272a;--text:#fafafa;--dim:#a1a1aa;--muted:#52525b;--kiro:#a78bfa;--claude:#fb923c;--copilot:#4ade80;--gemini:#60a5fa;--codex:#f472b6;--cline:#fbbf24;--accent:#a78bfa;--r:12px;--sw:260px}
body{background:var(--bg);color:var(--text);font-family:"Pretendard",-apple-system,sans-serif;height:100vh;display:grid;grid-template-columns:var(--sw) 1fr;overflow:hidden}
@media(max-width:768px){body{grid-template-columns:1fr}.sidebar{display:none}}

/* Sidebar */
.sidebar{background:var(--side);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.s-head{padding:12px 12px 8px;border-bottom:1px solid var(--border)}
.s-head .logo{font-size:15px;font-weight:800}.s-head .logo span{color:var(--muted);font-size:9px;margin-left:4px}
.s-head .tag{font-size:9px;color:var(--muted);margin-top:2px}
.new-btn{margin:6px 8px;padding:6px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--dim);font-size:10px;cursor:pointer;text-align:center;font-family:inherit}
.new-btn:hover{border-color:var(--muted);color:var(--text)}
.stitle{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px 3px}
.sess-list{flex:1;overflow-y:auto;padding:2px 6px}
.sess-list::-webkit-scrollbar{width:2px}.sess-list::-webkit-scrollbar-thumb{background:var(--border)}
.si{padding:6px 8px;border-radius:6px;cursor:pointer;margin-bottom:1px;font-size:10px}
.si:hover{background:var(--el)}.si .t{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.si .m{color:var(--muted);font-size:8px;margin-top:1px}
.s-set{border-top:1px solid var(--border);padding:8px 10px;overflow-y:auto;max-height:180px}
.s-set::-webkit-scrollbar{width:2px}.s-set::-webkit-scrollbar-thumb{background:var(--border)}
.sr{display:flex;align-items:center;justify-content:space-between;padding:4px 2px;font-size:9px}
.sr label{color:var(--dim);min-width:55px}
.sr select{background:var(--el);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text);font-size:9px;font-family:inherit;outline:none;max-width:130px;width:100%}
.sr select:focus{border-color:var(--accent)}
.s-foot{padding:6px 10px;border-top:1px solid var(--border);font-size:8px;color:var(--muted);display:flex;justify-content:space-between}
.s-foot a{color:var(--muted);text-decoration:none}.s-foot a:hover{color:var(--dim)}
.path-r{font-size:8px;color:var(--muted);padding:2px;word-break:break-all}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden}
.m-head{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.m-head .info{font-size:10px;color:var(--dim)}
.view-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.vt-btn{padding:5px 10px;font-size:9px;font-weight:600;font-family:inherit;background:transparent;border:none;color:var(--muted);cursor:pointer}
.vt-btn.active{background:var(--el);color:var(--text)}
.dot{width:6px;height:6px;border-radius:50%}.dot.on{background:var(--copilot);box-shadow:0 0 4px rgba(74,222,128,.4)}.dot.load{background:#fbbf24;animation:p 1s infinite}.dot.off{background:var(--muted)}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

/* Chat view */
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;background:var(--chat)}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:var(--border)}

/* Split view */
.split{flex:1;overflow:hidden;display:none;background:var(--chat)}
.split.active{display:flex}
.chat-wrap.hidden{display:none}
.split-col{flex:1;border-right:1px solid var(--border);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.split-col:last-child{border-right:none}
.split-col .col-head{font-size:9px;font-weight:700;text-transform:uppercase;padding:4px 0 8px;position:sticky;top:0;background:var(--chat);z-index:1}
.split-col .col-head.kiro{color:var(--kiro)}.split-col .col-head.claude{color:var(--claude)}.split-col .col-head.copilot{color:var(--copilot)}.split-col .col-head.gemini{color:var(--gemini)}.split-col .col-head.codex{color:var(--codex)}
.split-col .col-body{font-size:11px;line-height:1.7;color:var(--dim)}
.split-col .col-body strong{color:var(--text)}

/* Messages */
.row{display:flex;gap:8px;max-width:640px;animation:fi .15s ease}
.row.u{align-self:flex-end;flex-direction:row-reverse}
.row.a{align-self:flex-start}
.row.mod{align-self:flex-end;flex-direction:row-reverse}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0;margin-top:1px}
.av.kiro{background:rgba(167,139,250,.12);color:var(--kiro)}.av.claude{background:rgba(251,146,60,.12);color:var(--claude)}.av.copilot{background:rgba(74,222,128,.12);color:var(--copilot)}.av.gemini{background:rgba(96,165,250,.12);color:var(--gemini)}.av.codex{background:rgba(244,114,182,.12);color:var(--codex)}.av.cline{background:rgba(251,191,36,.12);color:var(--cline)}.av.user{background:rgba(255,255,255,.04);color:var(--muted)}.av.mod{background:rgba(74,222,128,.1);color:var(--copilot)}
.bw{display:flex;flex-direction:column;gap:1px;max-width:520px}
.bm{font-size:8px;color:var(--muted);padding:0 3px;display:flex;gap:4px;align-items:center}
.bm .n{font-weight:700;text-transform:uppercase}.bm .n.kiro{color:var(--kiro)}.bm .n.claude{color:var(--claude)}.bm .n.copilot{color:var(--copilot)}.bm .n.gemini{color:var(--gemini)}.bm .n.codex{color:var(--codex)}.bm .n.mod{color:var(--copilot)}
.bub{padding:8px 11px;border-radius:var(--r);font-size:11px;line-height:1.7;word-break:break-word}
.row.u .bub,.row.mod .bub{background:#1a1535;border:1px solid rgba(99,102,241,.15);border-top-right-radius:3px}
.row.mod .bub{background:#0f1f15;border-color:rgba(74,222,128,.15)}
.row.a .bub{background:var(--el);border:1px solid var(--border);border-top-left-radius:3px}
.bub strong{color:var(--text)}.bub code{background:rgba(255,255,255,.04);padding:1px 3px;border-radius:2px;font-size:10px;font-family:"SF Mono",monospace}
.sys-msg{align-self:center;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.02);border:1px solid var(--border);font-size:9px;color:var(--muted);font-style:italic}
.typing{display:inline-flex;gap:3px;padding:8px 11px;background:var(--el);border:1px solid var(--border);border-radius:var(--r);border-top-left-radius:3px}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}

/* Progress bar */
.progress-bar{display:flex;gap:6px;padding:6px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.pb-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.pb-item .pb-dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.pb-item.active .pb-dot{background:#fbbf24;animation:p .8s infinite}
.pb-item.done .pb-dot{background:var(--copilot)}
.pb-item.done{color:var(--dim)}

/* Input */
.input-area{padding:10px 16px 14px;border-top:1px solid var(--border);flex-shrink:0}
.agent-chips{display:flex;gap:4px;max-width:640px;margin:0 auto 6px;flex-wrap:wrap}
.chip{padding:3px 8px;border-radius:10px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .12s}
.chip.on{background:var(--el);color:var(--text);border-color:var(--dim)}
.chip.on.kiro{border-color:var(--kiro);color:var(--kiro)}.chip.on.claude{border-color:var(--claude);color:var(--claude)}.chip.on.copilot{border-color:var(--copilot);color:var(--copilot)}.chip.on.gemini{border-color:var(--gemini);color:var(--gemini)}.chip.on.codex{border-color:var(--codex);color:var(--codex)}.chip.on.cline{border-color:var(--cline);color:var(--cline)}
.input-row{display:flex;gap:6px;align-items:flex-end;max-width:640px;margin:0 auto}
.mode-sw{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;align-self:flex-end}
.mode-b{padding:7px 10px;font-size:9px;font-weight:600;font-family:inherit;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:all .12s}
.mode-b.active{background:var(--el);color:var(--text)}
#inp{flex:1;background:var(--el);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;color:var(--text);font-size:11px;font-family:inherit;resize:none;min-height:36px;max-height:140px;line-height:1.5;outline:none}
#inp:focus{border-color:var(--accent)}#inp:disabled{opacity:.3}#inp::placeholder{color:var(--muted)}
#snd{width:34px;height:34px;border-radius:8px;border:none;background:var(--accent);color:#000;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#snd:disabled{opacity:.2;cursor:not-allowed}

.welcome{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted)}
.welcome .big{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-.04em}
.welcome p{font-size:10px;max-width:240px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="sidebar">
  <div class="s-head"><div class="logo">Lun<span>v1.4.0</span></div><div class="tag">Multi-agent consensus</div></div>
  <button class="new-btn" id="newBtn">+ New</button>
  <div class="stitle">Sessions</div>
  <div class="sess-list" id="sessList"></div>
  <div class="s-set">
    <div class="stitle">Models</div>
    <div class="sr"><label>Kiro</label><select id="mKiro"></select></div>
    <div class="sr"><label>Claude</label><select id="mClaude"></select></div>
    <div class="sr"><label>Copilot</label><select id="mCopilot"></select></div>
    <div class="sr"><label>Gemini</label><select id="mGemini"></select></div>
    <div class="sr"><label>Codex</label><select id="mCodex"></select></div>
    <div class="stitle" style="margin-top:6px">Moderator</div>
    <div class="sr"><label>Agent</label><select id="mMod"></select></div>
    <div class="stitle" style="margin-top:6px">Storage</div>
    <div class="path-r" id="stoPath"></div>
  </div>
  <div class="s-foot"><span>MIT</span><a href="https://github.com/soonsoon2/lun" target="_blank">GitHub</a></div>
</div>

<div class="main">
  <div class="m-head">
    <span class="info" id="hInfo">Ready</span>
    <div class="view-toggle">
      <button class="vt-btn active" data-view="chat">Chat</button>
      <button class="vt-btn" data-view="split">Split</button>
    </div>
    <div class="dot off" id="dot"></div>
  </div>
  <div class="progress-bar" id="pbar" style="display:none"></div>

  <div class="chat-wrap" id="chatWrap">
    <div class="chat" id="chat">
      <div class="welcome" id="wel"><div class="big">Lun</div><p>Ask multiple AI agents and compare perspectives.</p></div>
    </div>
  </div>
  <div class="split" id="splitView"></div>

  <div class="input-area">
    <div class="agent-chips" id="chips"></div>
    <div class="input-row">
      <div class="mode-sw"><button class="mode-b active" data-mode="chat">Chat</button><button class="mode-b" data-mode="normal">Ask</button><button class="mode-b" data-mode="discuss">Discuss</button></div>
      <textarea id="inp" placeholder="Chat with PM..." rows="1"></textarea>
      <button id="snd">↑</button>
    </div>
  </div>
</div>

<script>
const chat=document.getElementById("chat"),wel=document.getElementById("wel"),inp=document.getElementById("inp"),snd=document.getElementById("snd"),dot=document.getElementById("dot"),hInfo=document.getElementById("hInfo"),sessList=document.getElementById("sessList"),pbar=document.getElementById("pbar"),splitView=document.getElementById("splitView"),chatWrap=document.getElementById("chatWrap");
let ws=null,waiting=false,composing=false,mode="chat",view="chat";
const AG={kiro:{l:"Kiro",a:"K"},claude:{l:"Claude",a:"C"},copilot:{l:"Co",a:"Co"},gemini:{l:"Gem",a:"G"},codex:{l:"Cdx",a:"Cx"},cline:{l:"Cln",a:"Cl"}};
let activeAgents=new Set(),splitData={};

// View toggle
document.querySelectorAll(".vt-btn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".vt-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");
  view=b.dataset.view;
  chatWrap.classList.toggle("hidden",view==="split");splitView.classList.toggle("active",view==="split");
  if(view==="split")renderSplit();
}));
// Mode
document.querySelectorAll(".mode-b").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".mode-b").forEach(x=>x.classList.remove("active"));b.classList.add("active");
  mode=b.dataset.mode;
  inp.placeholder=mode==="discuss"?"Start a discussion...":mode==="chat"?"Chat with PM...":"Ask all agents...";
}));

// Helpers
function hide(){wel.style.display="none"}
function el(t,c){const e=document.createElement(t);e.className=c;return e}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function md(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/^- (.+)$/gm,"&bull; $1").replace(/\n/g,"<br>")}
function scroll(){chat.scrollTop=chat.scrollHeight}

// Progress bar
function showProgress(agents){pbar.style.display="flex";pbar.innerHTML="";for(const a of agents){const d=el("div","pb-item active");d.id=`pb-${a}`;d.innerHTML=`<span class="pb-dot"></span>${AG[a]?.l||a}`;pbar.appendChild(d)}}
function updateProgress(pid,state,time){const item=document.getElementById(`pb-${pid}`);if(!item)return;item.className=`pb-item ${state}`;if(time)item.innerHTML=`<span class="pb-dot"></span>${AG[pid]?.l||pid} ${time}s`}
function hideProgress(){pbar.style.display="none"}

// Messages
function addUser(t){hide();const r=el("div","row u");r.innerHTML=`<div class="av user">Me</div><div class="bw"><div class="bub">${esc(t)}</div></div>`;chat.appendChild(r);scroll()}
function addAi(pid,text,elapsed){
  const old=document.getElementById(`ty-${pid}`);if(old)old.remove();hide();
  const r=el("div","row a");const time=elapsed?`${elapsed}s`:"";
  r.innerHTML=`<div class="av ${pid}">${AG[pid]?.a||"?"}</div><div class="bw"><div class="bm"><span class="n ${pid}">${AG[pid]?.l||pid}</span><span>${time}</span></div><div class="bub">${md(text||"(no response)")}</div></div>`;
  chat.appendChild(r);scroll();
  splitData[pid]=text;updateProgress(pid,"done",elapsed);
}
function addTyping(pid){hide();if(document.getElementById(`ty-${pid}`))return;const r=el("div","row a");r.id=`ty-${pid}`;r.innerHTML=`<div class="av ${pid}">${AG[pid]?.a||"?"}</div><div class="bw"><div class="bm"><span class="n ${pid}">${AG[pid]?.l||pid}</span></div><div class="typing"><span></span><span></span><span></span></div></div>`;chat.appendChild(r);scroll()}
function addChunk(pid,delta){const ty=document.getElementById(`ty-${pid}`);if(!ty)return;const bw=ty.querySelector(".bw");let bub=bw.querySelector(".bub");if(!bub){const old=bw.querySelector(".typing");if(old)old.remove();bub=document.createElement("div");bub.className="bub";bub.style.opacity=".7";bw.appendChild(bub)}bub.textContent+=delta;scroll()}
function addMod(text,elapsed){hide();const r=el("div","row mod");const time=elapsed?`${elapsed}s`:"";r.innerHTML=`<div class="av mod">Mod</div><div class="bw"><div class="bm"><span class="n mod">MODERATOR</span><span>${time}</span></div><div class="bub">${md(text||"")}</div></div>`;chat.appendChild(r);scroll()}
function addSys(t){hide();const d=el("div","sys-msg");d.textContent=t;chat.appendChild(d);scroll()}

// Split view
function renderSplit(){
  splitView.innerHTML="";
  for(const[pid,text]of Object.entries(splitData)){
    const col=el("div","split-col");
    col.innerHTML=`<div class="col-head ${pid}">${AG[pid]?.l||pid}</div><div class="col-body">${md(text||"")}</div>`;
    splitView.appendChild(col);
  }
}

// Sessions
async function loadSessions(){
  try{const r=await fetch("/api/sessions");const d=await r.json();document.getElementById("stoPath").textContent=d.path||"";
  const ss=d.sessions||[];if(!ss.length){sessList.innerHTML='<div style="padding:8px;color:var(--muted);font-size:9px;text-align:center">No sessions</div>';return}
  sessList.innerHTML="";for(const s of ss){const div=el("div","si");const date=s.date?new Date(s.date).toLocaleDateString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";div.innerHTML=`<div class="t">${esc(s.firstPrompt||"(untitled)")}</div><div class="m">${date} · ${s.turns}t</div>`;div.addEventListener("click",()=>openSession(s.id));sessList.appendChild(div)}}catch{}}

async function openSession(id){try{const r=await fetch(`/api/sessions/${encodeURIComponent(id)}`);const d=await r.json();if(d.error)return;chat.innerHTML="";hide();splitData={};for(const turn of(d.turns||[])){addUser(turn.prompt||"");for(const res of(turn.results||[]))addAi(res.provider,res.text,res.elapsed)}hInfo.textContent=`Session: ${id}`;if(view==="split")renderSplit()}catch{}}

// Models + Moderator
async function loadModels(){try{const r=await fetch("/api/provider-models");const d=await r.json();const modSel=document.getElementById("mMod");modSel.innerHTML="";
for(const[pid,models]of Object.entries(d.models||{})){const sel=document.getElementById(`m${pid.charAt(0).toUpperCase()+pid.slice(1)}`);if(sel){sel.innerHTML="";for(const m of models){if(m.id==="__custom__")continue;const o=document.createElement("option");o.value=m.id;o.textContent=m.label;sel.appendChild(o)}}
const mo=document.createElement("option");mo.value=pid;mo.textContent=AG[pid]?.l||pid;modSel.appendChild(mo)}
if(d.moderator)modSel.value=d.moderator;
modSel.addEventListener("change",async()=>{await fetch("/api/moderator",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({moderator:modSel.value})})})}catch{}}

// Agent chips
async function loadChips(){try{const r=await fetch("/api/providers");const d=await r.json();const c=document.getElementById("chips");c.innerHTML="";
for(const p of(d.providers||[])){if(!p.available)continue;const btn=document.createElement("button");btn.className=`chip on ${p.id}`;btn.textContent=AG[p.id]?.l||p.name;btn.dataset.id=p.id;activeAgents.add(p.id);
btn.addEventListener("click",()=>{btn.classList.toggle("on");if(btn.classList.contains("on"))activeAgents.add(p.id);else activeAgents.delete(p.id)});c.appendChild(btn)}}catch{}}

// WebSocket
function connect(){const proto=location.protocol==="https:"?"wss:":"ws:";ws=new WebSocket(`${proto}//${location.host}/ws`);
ws.onopen=()=>{ws.send(JSON.stringify({type:"start",provider:"all"}))};
ws.onmessage=(e)=>{const msg=JSON.parse(e.data);switch(msg.type){
case"ready":dot.className="dot on";hInfo.textContent="Ready";inp.disabled=false;snd.disabled=false;inp.focus();break;
case"thinking":showProgress([...activeAgents]);break;
case"provider-thinking":addTyping(msg.provider);break;
case"provider-chunk":addChunk(msg.provider,msg.delta);break;
case"provider-response":addAi(msg.provider,msg.text,msg.elapsed);break;
case"moderator-msg":addMod(msg.text,msg.elapsed);break;
case"system":addSys(msg.text);break;
case"done":waiting=false;dot.className="dot on";inp.disabled=false;snd.disabled=false;inp.focus();hideProgress();loadSessions();if(view==="split")renderSplit();break;
case"error":waiting=false;dot.className="dot on";inp.disabled=false;snd.disabled=false;hideProgress();break;
}};ws.onclose=()=>{dot.className="dot off";setTimeout(connect,2000)}}

// Input
function send(){if(composing||waiting)return;const t=inp.value.trim();if(!t)return;splitData={};
addUser(t);ws.send(JSON.stringify({type:"message",text:t,mode:mode,discuss:mode==="discuss",agents:[...activeAgents]}));
inp.value="";inp.style.height="36px";waiting=true;inp.disabled=true;snd.disabled=true;dot.className="dot load"}
snd.addEventListener("click",send);
inp.addEventListener("compositionstart",()=>{composing=true});inp.addEventListener("compositionend",()=>{composing=false});
inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey&&!composing){e.preventDefault();send()}});
inp.addEventListener("input",()=>{inp.style.height="36px";inp.style.height=Math.min(inp.scrollHeight,140)+"px"});
document.getElementById("newBtn").addEventListener("click",()=>{chat.innerHTML="";wel.style.display="flex";chat.appendChild(wel);splitData={};splitView.innerHTML="";hInfo.textContent="Ready";if(ws&&ws.readyState===1)ws.close();connect()});

// Init
connect();loadSessions();loadModels();loadChips();
</script>
</body>
</html>
