<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>lun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Base */
  --bg-base:#0a0a0f;--bg-elevated:#14141a;--bg-overlay:#1c1c24;--bg-input:#18181f;
  --border-subtle:#1f1f28;--border:#2a2a35;--border-strong:#3a3a48;
  /* Text */
  --text-primary:#fafafa;--text-secondary:#a1a1aa;--text-muted:#52525b;--text-disabled:#3f3f46;
  /* Agent accents */
  --kiro:#a78bfa;--claude:#f59e0b;--copilot:#4ade80;--agy:#60a5fa;--gemini:#60a5fa;--codex:#fb7185;--cline:#fbbf24;--pm:#4ade80;
  /* Semantic */
  --success:#4ade80;--warning:#f59e0b;--error:#ef4444;--info:#60a5fa;
  /* Fonts */
  --font-sans:"Inter","Pretendard",-apple-system,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",monospace;
}

html,body{height:100%;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);font-size:14px;line-height:1.65;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Layout shell */
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:48px 1fr;height:100vh;width:100vw}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}}

/* Header */
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border-subtle);background:var(--bg-base);z-index:10}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;letter-spacing:-0.01em}
.brand .v{font-family:var(--font-mono);color:var(--text-muted);font-weight:400;font-size:11px}
.crumbs{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.crumbs .sep{margin:0 6px;opacity:.5}
.header-right{display:flex;align-items:center;gap:12px}
.kbd{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--bg-elevated);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
.dot.on{background:var(--success);box-shadow:0 0 6px rgba(74,222,128,.5)}
.dot.load{background:var(--warning);animation:pulse 1.2s ease-in-out infinite}

/* Sidebar */
.sidebar{background:var(--bg-base);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:12px 8px}
.sb-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);padding:0 6px 8px}
.sb-action{width:100%;text-align:left;padding:6px 8px;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--text-secondary);font-family:var(--font-sans);font-size:12px;cursor:pointer;transition:all 150ms}
.sb-action:hover{border-color:var(--border-strong);color:var(--text-primary)}
.sess-list{flex:1;overflow-y:auto;padding:0 8px}
.sess-list::-webkit-scrollbar{width:6px}
.sess-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sess-list::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
.sess{padding:8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:background 100ms}
.sess:hover{background:var(--bg-elevated);color:var(--text-primary)}
.sess.active{background:var(--bg-elevated);color:var(--text-primary)}
.sess .title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sess .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px}
.sb-footer{border-top:1px solid var(--border-subtle);padding:10px 14px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:flex;justify-content:space-between}
.sb-footer a{color:inherit;text-decoration:none}
.sb-footer a:hover{color:var(--text-secondary)}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base)}
.main-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border-subtle);font-size:11px;color:var(--text-muted)}
.main-toolbar .pills{display:flex;gap:4px}
.mode-pill{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all 120ms}
.mode-pill.active{background:var(--bg-elevated);border-color:var(--border-strong);color:var(--text-primary)}
.mode-pill:hover:not(.active){border-color:var(--border-strong);color:var(--text-primary)}

/* Chat area */
.chat{flex:1;overflow-y:auto;padding:24px 0 16px;display:flex;flex-direction:column;gap:24px;align-items:center;position:relative}
.chat::-webkit-scrollbar{width:8px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
.chat-inner{width:100%;max-width:760px;padding:0 20px;display:flex;flex-direction:column;gap:24px}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-muted)}
.welcome .logo{font-size:32px;font-weight:800;letter-spacing:-0.04em;color:var(--text-primary)}
.welcome .tag{font-size:13px;max-width:380px;text-align:center;line-height:1.6}
.welcome .hint{font-family:var(--font-mono);font-size:11px;color:var(--text-disabled);margin-top:16px}

/* Message */
.msg{width:100%;animation:fadeIn 200ms ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
.msg-row{display:flex;gap:12px}
.msg-row.user{justify-content:flex-end}

.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.agent-tag{font-family:var(--font-mono);font-size:12px;font-weight:600}
.msg-time{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}

.msg-body{font-size:14px;line-height:1.7;color:var(--text-primary);word-break:break-word}
.msg-body code{font-family:var(--font-mono);font-size:12px;background:var(--bg-elevated);padding:1px 5px;border-radius:3px;border:1px solid var(--border-subtle)}
.msg-body pre{background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;padding:12px;margin:8px 0;overflow-x:auto}
.msg-body pre code{background:transparent;border:none;padding:0;font-size:12px;line-height:1.6}
.msg-body strong{font-weight:600;color:var(--text-primary)}
.msg-body em{font-style:italic;color:var(--text-primary)}
.msg-body a{color:var(--info);text-decoration:none}
.msg-body a:hover{text-decoration:underline}
.msg-body h1,.msg-body h2,.msg-body h3,.msg-body h4{font-weight:600;line-height:1.3;margin:16px 0 8px;color:var(--text-primary)}
.msg-body h1{font-size:18px;border-bottom:1px solid var(--border-subtle);padding-bottom:6px}
.msg-body h2{font-size:16px}
.msg-body h3{font-size:14px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;font-family:var(--font-mono)}
.msg-body h4{font-size:13px}
.msg-body h1:first-child,.msg-body h2:first-child,.msg-body h3:first-child{margin-top:0}
.msg-body p{margin:6px 0}
.msg-body p:first-child{margin-top:0}
.msg-body p:last-child{margin-bottom:0}
.msg-body ul,.msg-body ol{margin:6px 0 6px 20px;padding:0}
.msg-body li{margin:3px 0}
.msg-body li::marker{color:var(--text-muted)}
.msg-body hr{border:none;border-top:1px solid var(--border-subtle);margin:14px 0}
.msg-body blockquote{border-left:2px solid var(--border);padding-left:12px;margin:8px 0;color:var(--text-secondary)}
.msg-body table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.msg-body th,.msg-body td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.msg-body th{background:var(--bg-elevated);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-secondary)}

.msg-meta{margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:flex;gap:6px;align-items:center}
.msg-meta .sep{opacity:.4}

.msg.user .msg-content{display:inline-block;max-width:600px;background:transparent;border-right:2px solid var(--kiro);padding:0 12px 0 0;text-align:right}
.msg.user .msg-body{font-size:14px;color:var(--text-primary)}

.msg.pm .agent-tag{color:var(--pm)}
.msg.kiro .agent-tag{color:var(--kiro)}
.msg.claude .agent-tag{color:var(--claude)}
.msg.copilot .agent-tag{color:var(--copilot)}
.msg.agy .agent-tag,.msg.gemini .agent-tag{color:var(--agy)}
.msg.codex .agent-tag{color:var(--codex)}
.msg.cline .agent-tag{color:var(--cline)}

.msg.pm .msg-content{border-left:2px solid var(--pm);padding-left:12px;background:rgba(74,222,128,0.03)}

/* Typing indicator */
.typing{display:inline-flex;gap:3px;align-items:center;padding:4px 0}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--text-muted);animation:pulse 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}

/* System / round divider */
.sys{align-self:center;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:4px 12px;border:1px solid var(--border-subtle);border-radius:4px;background:var(--bg-base)}
.round-divider{display:flex;align-items:center;gap:12px;padding:8px 0;color:var(--text-muted);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
.round-divider::before,.round-divider::after{content:"";flex:1;height:1px;background:var(--border-subtle)}

/* Input area (command palette style) */
.input-area{padding:12px 20px 16px;border-top:1px solid var(--border-subtle)}
.cmd-row{display:flex;gap:8px;align-items:flex-end;max-width:760px;margin:0 auto}
.cmd-input{flex:1;display:flex;align-items:flex-start;gap:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:10px 12px;transition:border-color 150ms}
.cmd-input:focus-within{border-color:var(--border-strong)}
.cmd-prompt{font-family:var(--font-mono);font-size:14px;color:var(--text-muted);user-select:none;padding-top:0}
#inp{flex:1;background:transparent;border:none;color:var(--text-primary);font-family:var(--font-sans);font-size:14px;line-height:1.5;resize:none;min-height:22px;max-height:160px;outline:none}
#inp::placeholder{color:var(--text-muted)}
#snd{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg-elevated);color:var(--text-secondary);font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all 120ms}
#snd:hover:not(:disabled){border-color:var(--kiro);color:var(--kiro)}
#snd:disabled{opacity:.4;cursor:not-allowed}

#attachBtn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-elevated);color:var(--text-secondary);font-family:var(--font-mono);font-size:14px;cursor:pointer;align-self:flex-end;height:36px}
#attachBtn:hover{border-color:var(--border-strong);color:var(--text-primary)}

#attachments{display:flex;gap:6px;flex-wrap:wrap;max-width:760px;margin:0 auto 6px;padding:0}
.attachment{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-elevated);color:var(--text-secondary)}
.attachment .name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment .size{color:var(--text-muted);font-size:10px}
.attachment .x{cursor:pointer;color:var(--text-muted);padding:0 2px}
.attachment .x:hover{color:var(--error)}

.chat.drag-over{background:rgba(167,139,250,0.05)}
.drag-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:14px;color:var(--kiro);background:rgba(10,10,15,0.9);border:2px dashed var(--kiro);border-radius:8px;pointer-events:none;z-index:100}
.chat.drag-over .drag-overlay{display:flex}

.chips{display:flex;gap:4px;flex-wrap:wrap;max-width:760px;margin:0 auto 8px;padding:0}
.chip{font-family:var(--font-mono);font-size:11px;padding:3px 8px;border:1px solid var(--border-subtle);border-radius:3px;background:transparent;color:var(--text-muted);cursor:pointer;transition:all 100ms}
.chip.on{color:var(--text-primary);border-color:var(--border)}
.chip.on.kiro{color:var(--kiro);border-color:rgba(167,139,250,0.3)}
.chip.on.claude{color:var(--claude);border-color:rgba(245,158,11,0.3)}
.chip.on.copilot{color:var(--copilot);border-color:rgba(74,222,128,0.3)}
.chip.on.agy,.chip.on.gemini{color:var(--agy);border-color:rgba(96,165,250,0.3)}
.chip.on.codex{color:var(--codex);border-color:rgba(251,113,133,0.3)}
.chip:hover{border-color:var(--border-strong)}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;padding:2px 8px;border-radius:3px;border:1px solid var(--border)}
.pill-success{color:var(--success);border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06)}
.pill-warning{color:var(--warning);border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.06)}

/* Round table specific */
.round-block{display:flex;flex-direction:column;gap:16px;max-width:980px;margin:0 auto;width:100%}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.panel-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:16px;border-top:2px solid var(--border)}
.panel-card.kiro{border-top-color:var(--kiro)}
.panel-card.claude{border-top-color:var(--claude)}
.panel-card.copilot{border-top-color:var(--copilot)}
.panel-card.agy,.panel-card.gemini{border-top-color:var(--agy)}
.panel-card.codex{border-top-color:var(--codex)}
.synthesis{background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid var(--pm);border-radius:8px;padding:18px}
.synthesis .label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--pm);margin-bottom:8px}

/* Dashboard */
.dash{width:100%;max-width:980px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:14px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.metric{border:1px solid var(--border);background:var(--bg-elevated);border-radius:8px;padding:12px}
.metric .k{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.metric .v{font-family:var(--font-mono);font-size:24px;line-height:1.2;margin-top:4px;color:var(--text-primary)}
.dash-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;border:1px solid var(--border)}
.dash-table th,.dash-table td{border-bottom:1px solid var(--border-subtle);padding:8px 10px;text-align:left;vertical-align:top}
.dash-table th{color:var(--text-muted);font-weight:500;background:var(--bg-elevated);text-transform:uppercase;letter-spacing:.06em}
.dash-table tr:last-child td{border-bottom:none}
.dash-path{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);word-break:break-all}
.dash-empty{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);padding:24px 0;text-align:center}

/* Control panel: settings + agents */
.dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.dash-title{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-primary);text-transform:lowercase}
.dash-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);font-weight:400;margin-left:8px}
.dash-note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin:-6px 0 4px}

.ctl-btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;transition:all 120ms}
.ctl-btn:hover:not(:disabled){border-color:var(--border-strong);color:var(--text-primary)}
.ctl-btn:disabled{opacity:.4;cursor:not-allowed}
.ctl-btn.sm{padding:3px 9px;font-size:10px}
.ctl-btn.primary{border-color:var(--kiro);color:var(--kiro)}
.ctl-btn.primary:hover:not(:disabled){background:rgba(167,139,250,0.08)}

.adot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);display:inline-block;flex:none}
.adot.on{background:var(--success);box-shadow:0 0 6px rgba(74,222,128,.5)}
.adot.load{background:var(--warning);animation:pulse 1.2s ease-in-out infinite}
.adot.off{background:var(--text-disabled)}
.adot.demand{background:var(--info);box-shadow:0 0 6px rgba(96,165,250,.4)}

.agent-list{display:flex;flex-direction:column;gap:6px}
.agent-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-elevated);border-left:2px solid var(--border)}
.agent-row.kiro{border-left-color:var(--kiro)}
.agent-row.claude{border-left-color:var(--claude)}
.agent-row.copilot{border-left-color:var(--copilot)}
.agent-row.agy,.agent-row.gemini{border-left-color:var(--agy)}
.agent-row.codex{border-left-color:var(--codex)}
.agent-id{display:flex;align-items:center;gap:8px;min-width:160px}
.agent-id .aname{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-primary)}
.agent-id .amodel{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.agent-meta{flex:1;display:flex;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);flex-wrap:wrap}
.agent-meta .atag{color:var(--text-muted);border:1px solid var(--border-subtle);border-radius:3px;padding:1px 6px}
.agent-meta .astat{text-transform:uppercase;letter-spacing:.04em}
.agent-meta .ahint{color:var(--text-disabled);font-style:italic}

.set-card{border:1px solid var(--border);border-radius:8px;background:var(--bg-elevated);padding:16px;display:flex;flex-direction:column;gap:10px}
.set-card-h{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text-primary)}
.set-row{display:flex;align-items:center;gap:12px}
.set-row label{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);min-width:90px;display:flex;align-items:center;gap:6px}
.set-row label.kiro{color:var(--kiro)}.set-row label.claude{color:var(--claude)}.set-row label.copilot{color:var(--copilot)}.set-row label.agy{color:var(--agy)}.set-row label.codex{color:var(--codex)}
.set-row select{flex:1;max-width:340px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;padding:7px 10px;cursor:pointer}
.set-row select:focus{outline:none;border-color:var(--border-strong)}
.set-actions{display:flex;align-items:center;gap:12px;margin-top:4px}
.set-msg{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.set-msg.ok{color:var(--success)}.set-msg.err{color:var(--error)}
.set-note{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}

/* Mode control bars (above chips) */
.mode-ctl{display:flex;align-items:center;gap:14px;max-width:760px;margin:0 auto 8px;flex-wrap:wrap}
.mode-ctl label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.mode-ctl select{background:var(--bg-input);border:1px solid var(--border);border-radius:5px;color:var(--text-primary);font-family:var(--font-mono);font-size:11px;padding:4px 8px;cursor:pointer}
.mode-ctl label.toggle{color:var(--text-secondary);cursor:pointer}
.mode-ctl .ctl-hint{font-family:var(--font-mono);font-size:10px;color:var(--text-disabled)}

/* "full" affordance on agent messages */
.msg-header .open-full{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);cursor:pointer;border:1px solid var(--border-subtle);border-radius:3px;padding:0 5px;opacity:0;transition:opacity 120ms}
.msg:hover .open-full{opacity:1}
.msg-header .open-full:hover{color:var(--text-primary);border-color:var(--border)}

/* Answer modal */
.modal-overlay{position:fixed;inset:0;background:rgba(5,5,8,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{width:min(720px,92vw);max-height:82vh;background:var(--bg-overlay);border:1px solid var(--border-strong);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal--wide{width:min(960px,94vw);max-height:88vh}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-subtle)}
.am-title{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-primary)}
.am-title.kiro{color:var(--kiro)}.am-title.claude{color:var(--claude)}.am-title.copilot{color:var(--copilot)}.am-title.agy{color:var(--agy)}.am-title.codex{color:var(--codex)}
.modal-x{background:none;border:none;color:var(--text-muted);font-size:22px;line-height:1;cursor:pointer;padding:0 4px}
.modal-x:hover{color:var(--text-primary)}
.modal-body{padding:18px;overflow-y:auto;font-size:14px;line-height:1.7;color:var(--text-primary)}
.modal-body pre{background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto}
.modal-body code{font-family:var(--font-mono);font-size:12px}

</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">lun <span class="v">v1.6.0</span></div>
    <div class="header-right">
      <span class="kbd">⌘K</span>
      <div class="dot off" id="statusDot"></div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sb-section">
      <button class="sb-action" id="newBtn">+ new session</button>
    </div>
    <div class="sb-section" style="padding-top:0">
      <div class="sb-title">sessions</div>
    </div>
    <div class="sess-list" id="sessList"></div>
    <div class="sb-footer">
      <span>MIT</span>
      <a href="https://github.com/soonsoon2/lun" target="_blank">github →</a>
    </div>
  </aside>

  <main class="main">
    <div class="main-toolbar">
      <div class="crumbs"><span id="crumbMode">chat</span><span class="sep">/</span><span id="crumbAgents">all agents</span></div>
      <div class="pills">
        <button class="mode-pill active" data-mode="lun">lun</button>
        <button class="mode-pill" data-mode="ask">ask</button>
        <button class="mode-pill" data-mode="discuss">discuss</button>
        <button class="mode-pill" data-mode="workers">agents</button>
        <button class="mode-pill" data-mode="usage">usage</button>
        <button class="mode-pill" data-mode="logs">logs</button>
        <button class="mode-pill" data-mode="settings">settings</button>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="drag-overlay">drop files to attach</div>
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="wel">
          <div class="logo">lun</div>
          <div class="tag">Multi-agent consensus, in your terminal.</div>
          <div class="hint">type a question to begin</div>
        </div>
      </div>
    </div>

    <div class="input-area" id="inputArea">
      <div class="mode-ctl" id="discussCtl" style="display:none">
        <label>style
          <select id="dTechnique">
            <option value="auto">auto (PM picks)</option>
            <option value="debate">debate</option>
            <option value="devils_advocate">devil's advocate</option>
            <option value="build">build &amp; extend</option>
          </select>
        </label>
        <label>rounds
          <select id="dRounds">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="5">5</option>
            <option value="0">unlimited</option>
          </select>
        </label>
        <label>max time
          <select id="dTime">
            <option value="60">60s</option>
            <option value="120" selected>120s</option>
            <option value="300">5m</option>
            <option value="0">none</option>
          </select>
        </label>
        <button class="ctl-btn sm" id="stopBtn" style="display:none">stop</button>
      </div>
      <div class="mode-ctl" id="lunCtl">
        <label class="toggle"><input type="checkbox" id="lunDetailed"> detailed report</label>
        <span class="ctl-hint">Lun consults the panel and replies with a synthesis. Click any agent answer to see it in full.</span>
      </div>
      <div class="chips" id="chips"></div>
      <div id="attachments"></div>
      <div class="cmd-row">
        <button id="attachBtn" title="Attach file">+</button>
        <input type="file" id="fileInput" multiple style="display:none">
        <div class="cmd-input">
          <span class="cmd-prompt">&gt;</span>
          <textarea id="inp" placeholder="ask anything... (drag files or click + to attach)" rows="1"></textarea>
        </div>
        <button id="snd">send</button>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="answerModal" style="display:none">
  <div class="modal">
    <div class="modal-head"><span class="am-title" id="amTitle"></span><button class="modal-x" id="amClose">×</button></div>
    <div class="modal-body" id="amBody"></div>
  </div>
</div>

<div class="modal-overlay" id="panelModal" style="display:none">
  <div class="modal modal--wide">
    <div class="modal-head"><span class="am-title" id="panelTitle">settings</span><button class="modal-x" id="panelClose">×</button></div>
    <div class="modal-body" id="panelBody"></div>
  </div>
</div>

<script>
const chat=document.getElementById("chat"),chatInner=document.getElementById("chatInner"),wel=document.getElementById("wel"),inp=document.getElementById("inp"),snd=document.getElementById("snd"),statusDot=document.getElementById("statusDot"),sessList=document.getElementById("sessList"),crumbMode=document.getElementById("crumbMode"),inputArea=document.getElementById("inputArea");
let ws=null,waiting=false,composing=false,mode="lun";
const AG={kiro:"kiro",claude:"claude",copilot:"copilot",agy:"agy",codex:"codex",cline:"cline"};
let activeAgents=new Set();

// Mode pills
document.querySelectorAll(".mode-pill").forEach(p=>p.addEventListener("click",()=>{
  const m=p.dataset.mode;
  const isPanel=(m==="usage"||m==="logs"||m==="workers"||m==="settings");
  // Panels open in a modal overlay — they never replace the conversation.
  if(isPanel){
    if(m==="workers")renderWorkers();
    if(m==="usage")renderUsage();
    if(m==="logs")renderLogs();
    if(m==="settings")renderSettings();
    return;
  }
  document.querySelectorAll(".mode-pill").forEach(x=>x.classList.remove("active"));
  p.classList.add("active");
  mode=m;
  crumbMode.textContent=mode;
  inputArea.style.display="block";
  inp.placeholder=mode==="lun"?"ask Lun anything — it consults the panel for you...":mode==="discuss"?"a question for the panel to debate...":"ask all agents the same question...";
  // mode-specific control bar
  const dc=document.getElementById("discussCtl"), lc=document.getElementById("lunCtl");
  if(dc)dc.style.display=mode==="discuss"?"flex":"none";
  if(lc)lc.style.display=mode==="lun"?"flex":"none";
}));

// Panel modal helpers — render dashboards/settings without touching the chat.
const panelModal=document.getElementById("panelModal"),panelBody=document.getElementById("panelBody"),panelTitle=document.getElementById("panelTitle");
function openPanel(title){panelTitle.textContent=title;panelBody.innerHTML='<div class="dash-empty">loading…</div>';panelModal.style.display="flex";}
function closePanel(){panelModal.style.display="none";}
document.getElementById("panelClose")?.addEventListener("click",closePanel);
panelModal.addEventListener("click",(e)=>{if(e.target.id==="panelModal")closePanel();});

function el(t,c){const e=document.createElement("div");if(c)e.className=c;return e}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function md(s){
  if(typeof marked==="undefined")return esc(s).replace(/\n/g,"<br>");
  marked.setOptions({breaks:true,gfm:true});
  return marked.parse(s||"");
}
function scroll(){chat.scrollTop=chat.scrollHeight}
function hide(){wel.style.display="none"}

function addUser(text){
  hide();
  const m=el("div","msg user");
  m.innerHTML=`<div class="msg-row user"><div class="msg-content"><div class="msg-body" style="white-space:pre-wrap">${esc(text)}</div></div></div>`;
  chatInner.appendChild(m);scroll();
}

function addAgent(provider,text,elapsed,model){
  removeTyping(provider);hide();
  const m=el("div",`msg ${provider}`);
  const time=elapsed?`${elapsed}s`:"";
  const meta=[model||"",time].filter(Boolean).join(" · ");
  const full=text||"(no response)";
  m.innerHTML=`<div class="msg-content"><div class="msg-header"><span class="agent-tag">${provider}/${model||"auto"}</span><span class="open-full" title="open full answer">⤢ full</span></div><div class="msg-body">${md(full)}</div>${meta?`<div class="msg-meta">${esc(meta)}</div>`:""}</div>`;
  m.querySelector(".open-full")?.addEventListener("click",()=>openAnswer(provider,model,full,elapsed));
  chatInner.appendChild(m);scroll();
}

function openAnswer(provider,model,text,elapsed){
  const ov=document.getElementById("answerModal");
  document.getElementById("amTitle").textContent=`${provider} / ${model||"auto"}${elapsed?` · ${elapsed}s`:""}`;
  document.getElementById("amBody").innerHTML=md(text||"");
  document.getElementById("amTitle").className="am-title "+provider;
  ov.style.display="flex";
}

function addPM(text,elapsed,model){
  hide();
  const m=el("div","msg pm");
  const time=elapsed?`${elapsed}s`:"";
  const meta=[model||"auto",time].filter(Boolean).join(" · ");
  m.innerHTML=`<div class="msg-content"><div class="msg-header"><span class="agent-tag">pm/${model||"auto"}</span></div><div class="msg-body">${md(text||"")}</div><div class="msg-meta">${esc(meta)}</div></div>`;
  chatInner.appendChild(m);scroll();
}

function addTyping(provider){
  hide();if(document.getElementById(`ty-${provider}`))return;
  const m=el("div",`msg ${provider}`);
  m.id=`ty-${provider}`;
  m.innerHTML=`<div class="msg-content"><div class="msg-header"><span class="agent-tag">${provider}/auto</span></div><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatInner.appendChild(m);scroll();
}
function removeTyping(provider){const t=document.getElementById(`ty-${provider}`);if(t)t.remove()}

function addSys(text){hide();const d=el("div","sys");d.textContent=text;chatInner.appendChild(d);scroll()}
function addRoundDivider(round){hide();const d=el("div","round-divider");d.textContent=`round ${round}`;chatInner.appendChild(d);scroll()}

// Sessions
async function loadSessions(){
  try{const r=await fetch("/api/sessions");const d=await r.json();
  const ss=d.sessions||[];
  if(!ss.length){sessList.innerHTML='<div style="padding:12px 8px;color:var(--text-muted);font-size:11px">no sessions yet</div>';return}
  sessList.innerHTML="";
  for(const s of ss){
    const div=el("div","sess");
    const date=s.date?new Date(s.date).toLocaleDateString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
    div.innerHTML=`<div class="title">${esc(s.firstPrompt||"(untitled)")}</div><div class="meta">${date} · ${s.turns}t</div>`;
    div.addEventListener("click",()=>openSession(s.id));
    sessList.appendChild(div);
  }}catch{}}

async function openSession(id){
  try{const r=await fetch(`/api/sessions/${encodeURIComponent(id)}`);const d=await r.json();
  if(d.error)return;
  chatInner.innerHTML="";hide();
  for(const turn of(d.turns||[])){
    addUser(turn.prompt||"");
    for(const res of(turn.results||[]))addAgent(res.provider,res.text,res.elapsed,res.model);
  }
  }catch{}}

function fmtMs(ms){return ms===0?"0.00s":ms?`${(ms/1000).toFixed(ms>=10000?1:2)}s`:"-"}
function fmtCost(usd){if(usd==null)return "-";if(usd===0)return "$0";if(usd<0.01)return "<$0.01";return "$"+usd.toFixed(usd<1?3:2)}
function fmtTime(ts){try{return new Date(ts).toLocaleString()}catch{return ts||""}}

async function renderUsage(){
  openPanel("usage");
  try{
    const [uRes,dRes]=await Promise.all([fetch("/api/usage"),fetch("/api/daemon")]);
    const usage=await uRes.json();
    const daemon=await dRes.json();
    const t=usage.totals||{};
    const providers=usage.providers||[];
    const recent=usage.recent||[];
    panelBody.innerHTML=`<div class="dash">
      <div class="dash-grid">
        <div class="metric"><div class="k">runs</div><div class="v">${t.runs||0}</div></div>
        <div class="metric"><div class="k">ok</div><div class="v">${t.ok||0}</div></div>
        <div class="metric"><div class="k">errors</div><div class="v">${t.errors||0}</div></div>
        <div class="metric"><div class="k">avg</div><div class="v">${fmtMs(t.avgLatencyMs)}</div></div>
        <div class="metric"><div class="k">est. cost</div><div class="v">${fmtCost(t.costUsd)}</div></div>
      </div>
      <div class="dash-note">Cost is a rough estimate (~4 chars/token × published model rates), not real billing.</div>
      <div class="dash-path">${esc(daemon.paths?.usage||usage.path||"")}</div>
      ${providers.length?`<table class="dash-table"><thead><tr><th>provider</th><th>runs</th><th>ok</th><th>err</th><th>avg</th><th>in/out chars</th><th>est. cost</th><th>model</th></tr></thead><tbody>${providers.map(p=>`<tr><td>${esc(p.provider)}</td><td>${p.count}</td><td>${p.ok}</td><td>${p.errors}</td><td>${fmtMs(p.avgLatencyMs)}</td><td>${p.inputChars}/${p.outputChars}</td><td>${fmtCost(p.costUsd)}</td><td>${esc(p.lastModel||"auto")}</td></tr>`).join("")}</tbody></table>`:`<div class="dash-empty">no provider runs yet</div>`}
      ${recent.length?`<table class="dash-table"><thead><tr><th>time</th><th>mode</th><th>provider</th><th>status</th><th>latency</th><th>output</th><th>est. cost</th></tr></thead><tbody>${recent.slice(0,20).map(r=>`<tr><td>${esc(fmtTime(r.ts))}</td><td>${esc(r.mode||"")}</td><td>${esc(r.provider||"")}</td><td>${esc(r.status||"")}</td><td>${fmtMs(r.latencyMs)}</td><td>${r.outputChars||0}</td><td>${fmtCost(r.costUsd)}</td></tr>`).join("")}</tbody></table>`:""}
    </div>`;
  }catch(e){
    panelBody.innerHTML=`<div class="dash-empty">usage unavailable</div>`;
  }
}

async function renderLogs(){
  openPanel("logs");
  try{
    const r=await fetch("/api/logs?limit=200");
    const d=await r.json();
    const logs=d.logs||[];
    panelBody.innerHTML=`<div class="dash">
      <div class="dash-path">${esc(d.path||"")}</div>
      ${logs.length?`<table class="dash-table"><thead><tr><th>time</th><th>level</th><th>message</th><th>detail</th></tr></thead><tbody>${logs.slice().reverse().map(l=>`<tr><td>${esc(fmtTime(l.ts))}</td><td>${esc(l.level||"info")}</td><td>${esc(l.message||"")}</td><td>${esc(JSON.stringify(Object.fromEntries(Object.entries(l).filter(([k])=>!["ts","level","message"].includes(k))))).slice(0,240)}</td></tr>`).join("")}</tbody></table>`:`<div class="dash-empty">no logs yet</div>`}
    </div>`;
  }catch(e){
    panelBody.innerHTML=`<div class="dash-empty">logs unavailable</div>`;
  }
}

async function renderWorkers(){
  openPanel("agents");
  try{
    const r=await fetch("/api/workers");
    const d=await r.json();
    const workers=d.workers||[];
    const warmCount=workers.filter(w=>w.alive&&w.ready).length;
    panelBody.innerHTML=`<div class="dash">
      <div class="dash-head">
        <div class="dash-title">agents <span class="dash-sub">${warmCount}/${workers.length} warm</span></div>
        <button class="ctl-btn" id="restartAll">restart all</button>
      </div>
      ${workers.length?`<div class="agent-list">${workers.map(w=>{
        const installed=w.ready||w.alive;
        let state, stateCls, hint;
        if(!installed){ state="not installed"; stateCls="off"; hint="executable not found on PATH"; }
        else if(w.protocol==="spawn-per-turn"){ state="on-demand"; stateCls="demand"; hint="no warm mode — spawns fresh each call (normal)"; }
        else if(w.alive&&w.ready){ state="warm"; stateCls="on"; hint=""; }
        else if(w.alive){ state="starting"; stateCls="load"; hint=""; }
        else { state="cold"; stateCls="off"; hint="starts on first request"; }
        const canRestart=installed&&w.protocol!=="spawn-per-turn";
        return `<div class="agent-row ${esc(w.provider)}">
          <div class="agent-id"><span class="adot ${stateCls}"></span><span class="aname">${esc(w.provider)}</span><span class="amodel">${esc(w.model||"auto")}</span></div>
          <div class="agent-meta">
            <span class="atag">${esc(w.protocol||"")}</span>
            <span class="astat">${state}</span>
            <span>${w.runs??0} runs</span>
            <span>${w.busy?"busy":(w.queued?w.queued+" queued":"idle")}</span>
            ${hint?`<span class="ahint">${esc(hint)}</span>`:""}
          </div>
          ${canRestart?`<button class="ctl-btn sm" data-restart="${esc(w.provider)}">restart</button>`:`<button class="ctl-btn sm" disabled>—</button>`}
        </div>`;
      }).join("")}</div>`:`<div class="dash-empty">no agents configured</div>`}
    </div>`;
    document.getElementById("restartAll")?.addEventListener("click",()=>restartWorker(null));
    document.querySelectorAll("[data-restart]").forEach(b=>b.addEventListener("click",()=>restartWorker(b.dataset.restart)));
  }catch(e){
    panelBody.innerHTML=`<div class="dash-empty">agents unavailable</div>`;
  }
}

async function restartWorker(provider){
  const label=provider||"all";
  const btns=document.querySelectorAll(".ctl-btn");
  btns.forEach(b=>b.disabled=true);
  try{
    await fetch("/api/workers/restart",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(provider?{provider}:{})});
    await new Promise(r=>setTimeout(r,600));
    renderWorkers();
  }catch{
    btns.forEach(b=>b.disabled=false);
    alert("restart "+label+" failed");
  }
}

async function renderSettings(){
  openPanel("settings");
  try{
    const r=await fetch("/api/config");
    const d=await r.json();
    const cfg=d.config||{};
    const provs=d.providers||[];
    const installed=provs.filter(p=>p.available);
    const pmOptions=installed.map(p=>`<option value="${esc(p.id)}" ${cfg.pmAgent===p.id?"selected":""}>${esc(p.id)}</option>`).join("");
    const pmAgentDef=provs.find(p=>p.id===cfg.pmAgent);
    const pmModelOptions=(pmAgentDef?.models||[]).map(m=>`<option value="${esc(m.id)}" ${cfg.pmModel===m.id?"selected":""}>${esc(m.label||m.id)}</option>`).join("");
    panelBody.innerHTML=`<div class="dash">
      <div class="dash-title">settings</div>

      <div class="set-card">
        <div class="set-card-h">PM agent <span class="dash-sub">hosts chat, routes work, synthesizes</span></div>
        <div class="set-row">
          <label>agent</label>
          <select id="setPmAgent">${pmOptions}</select>
        </div>
        <div class="set-row">
          <label>model</label>
          <select id="setPmModel">${pmModelOptions||'<option value="auto">auto</option>'}</select>
        </div>
      </div>

      <div class="set-card">
        <div class="set-card-h">default model per agent <span class="dash-sub">used when this agent runs</span></div>
        ${installed.map(p=>`<div class="set-row">
          <label class="${esc(p.id)}"><span class="adot on"></span>${esc(p.id)}</label>
          <select data-model="${esc(p.id)}">${(p.models||[]).map(m=>`<option value="${esc(m.id)}" ${p.selectedModel===m.id?"selected":""}>${esc(m.label||m.id)}</option>`).join("")||`<option value="${esc(p.selectedModel||'auto')}">${esc(p.selectedModel||'auto')}</option>`}</select>
        </div>`).join("")}
      </div>

      ${provs.some(p=>!p.available)?`<div class="set-note">not installed: ${provs.filter(p=>!p.available).map(p=>esc(p.id)).join(", ")}</div>`:""}

      <div class="set-actions">
        <button class="ctl-btn primary" id="saveSettings">save</button>
        <span id="saveMsg" class="set-msg"></span>
      </div>
    </div>`;

    // When PM agent changes, refresh its model dropdown
    document.getElementById("setPmAgent")?.addEventListener("change",(e)=>{
      const sel=provs.find(p=>p.id===e.target.value);
      const modelSel=document.getElementById("setPmModel");
      modelSel.innerHTML=(sel?.models||[]).map(m=>`<option value="${esc(m.id)}">${esc(m.label||m.id)}</option>`).join("")||'<option value="auto">auto</option>';
    });

    document.getElementById("saveSettings")?.addEventListener("click",async()=>{
      const pmAgent=document.getElementById("setPmAgent")?.value;
      const pmModel=document.getElementById("setPmModel")?.value;
      const models={};
      document.querySelectorAll("[data-model]").forEach(s=>{models[s.dataset.model]=s.value;});
      const msg=document.getElementById("saveMsg");
      msg.textContent="saving...";
      try{
        const res=await fetch("/api/config",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({pmAgent,pmModel,models})});
        const j=await res.json();
        if(j.error){msg.textContent="✕ "+j.error;msg.className="set-msg err";}
        else{msg.textContent="✓ saved — restart agents to apply model changes";msg.className="set-msg ok";}
      }catch{msg.textContent="✕ save failed";msg.className="set-msg err";}
    });
  }catch(e){
    panelBody.innerHTML=`<div class="dash-empty">settings unavailable</div>`;
  }
}

// Chips
async function loadChips(){
  try{const r=await fetch("/api/providers");const d=await r.json();
  const c=document.getElementById("chips");c.innerHTML="";
  for(const p of(d.providers||[])){
    if(!p.available)continue;
    const btn=document.createElement("button");
    btn.className=`chip on ${p.id}`;
    btn.textContent=p.id;
    btn.dataset.id=p.id;
    activeAgents.add(p.id);
    btn.addEventListener("click",()=>{
      btn.classList.toggle("on");
      if(btn.classList.contains("on"))activeAgents.add(p.id);
      else activeAgents.delete(p.id);
      document.getElementById("crumbAgents").textContent=activeAgents.size===0?"none":[...activeAgents].join(", ");
    });
    c.appendChild(btn);
  }
  document.getElementById("crumbAgents").textContent=[...activeAgents].join(", ");
  }catch{}}

// WebSocket
function connect(){
  const proto=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>{ws.send(JSON.stringify({type:"start",provider:"all"}))};
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    switch(msg.type){
      case"ready":statusDot.className="dot on";inp.disabled=false;snd.disabled=false;inp.focus();break;
      case"thinking":break;
      case"provider-thinking":addTyping(msg.provider);break;
      case"provider-response":addAgent(msg.provider,msg.text,msg.elapsed,msg.model);break;
      case"moderator-msg":addPM(msg.text,msg.elapsed,msg.model);break;
      case"system":addSys(msg.text);break;
      case"discuss-turn":addRoundDivider(msg.turn);break;
      case"done":waiting=false;statusDot.className="dot on";inp.disabled=false;snd.disabled=false;inp.focus();loadSessions();{const sb=document.getElementById("stopBtn");if(sb)sb.style.display="none";}break;
      case"error":waiting=false;statusDot.className="dot on";inp.disabled=false;snd.disabled=false;addSys("error: "+msg.message);break;
    }
  };
  ws.onclose=()=>{statusDot.className="dot off";setTimeout(connect,2000)};
}

function send(){
  if(composing||waiting)return;
  let t=inp.value.trim();
  if(!t && attachedFiles.length===0)return;

  // Append attached file contents
  if(attachedFiles.length>0){
    const filesText=attachedFiles.map(f=>`\n\n--- File: ${f.name} ---\n${f.content}`).join("");
    t=(t||"Please review the attached file(s).")+filesText;
  }

  addUser(inp.value.trim()+(attachedFiles.length>0?` [${attachedFiles.length} file(s) attached]`:""));
  const payload={type:"message",text:t,mode:mode,discuss:mode==="discuss",agents:[...activeAgents]};
  if(mode==="lun"){
    payload.reportStyle=document.getElementById("lunDetailed")?.checked?"detailed":"brief";
  }
  if(mode==="discuss"){
    payload.technique=document.getElementById("dTechnique")?.value||"auto";
    payload.maxTurns=Number(document.getElementById("dRounds")?.value??3);
    payload.maxTime=Number(document.getElementById("dTime")?.value??120);
    const sb=document.getElementById("stopBtn");if(sb)sb.style.display="inline-block";
  }
  ws.send(JSON.stringify(payload));
  inp.value="";inp.style.height="22px";
  attachedFiles=[];renderAttachments();
  waiting=true;inp.disabled=true;snd.disabled=true;statusDot.className="dot load";
}

let attachedFiles=[];

function renderAttachments(){
  const div=document.getElementById("attachments");
  div.innerHTML="";
  attachedFiles.forEach((f,i)=>{
    const el=document.createElement("div");
    el.className="attachment";
    el.innerHTML=`<span class="name">${esc(f.name)}</span><span class="size">${(f.content.length/1024).toFixed(1)}KB</span><span class="x" data-i="${i}">×</span>`;
    el.querySelector(".x").addEventListener("click",()=>{attachedFiles.splice(i,1);renderAttachments()});
    div.appendChild(el);
  });
}

async function readFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsText(file);
  });
}

async function handleFiles(files){
  for(const file of files){
    if(file.size>1024*1024){alert(`${file.name}: too large (>1MB)`);continue}
    try{
      const content=await readFile(file);
      attachedFiles.push({name:file.name,content});
    }catch(e){alert(`failed to read ${file.name}`)}
  }
  renderAttachments();
}

document.getElementById("attachBtn").addEventListener("click",()=>document.getElementById("fileInput").click());
document.getElementById("fileInput").addEventListener("change",(e)=>{handleFiles(e.target.files);e.target.value=""});

// Drag and drop
const chatEl=document.getElementById("chat");
chatEl.addEventListener("dragover",(e)=>{e.preventDefault();chatEl.classList.add("drag-over")});
chatEl.addEventListener("dragleave",(e)=>{if(e.target===chatEl)chatEl.classList.remove("drag-over")});
chatEl.addEventListener("drop",(e)=>{
  e.preventDefault();chatEl.classList.remove("drag-over");
  if(e.dataTransfer.files.length>0)handleFiles(e.dataTransfer.files);
});
snd.addEventListener("click",send);
document.getElementById("stopBtn")?.addEventListener("click",()=>{
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"stop"}));
  document.getElementById("stopBtn").style.display="none";
});
document.getElementById("amClose")?.addEventListener("click",()=>{document.getElementById("answerModal").style.display="none";});
document.getElementById("answerModal")?.addEventListener("click",(e)=>{if(e.target.id==="answerModal")e.currentTarget.style.display="none";});
document.addEventListener("keydown",(e)=>{if(e.key==="Escape"){const m=document.getElementById("answerModal");if(m)m.style.display="none";const pm=document.getElementById("panelModal");if(pm)pm.style.display="none";}});
inp.addEventListener("compositionstart",()=>{composing=true});
inp.addEventListener("compositionend",()=>{composing=false});
inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!e.shiftKey&&!composing){e.preventDefault();send()}});
inp.addEventListener("input",()=>{inp.style.height="22px";inp.style.height=Math.min(inp.scrollHeight,160)+"px"});
document.getElementById("newBtn").addEventListener("click",()=>{chatInner.innerHTML="";wel.style.display="flex";chatInner.appendChild(wel);if(ws&&ws.readyState===1)ws.close();connect()});

// Browser-lifecycle heartbeat: while this tab is open, keep the Lun
// environment alive. When the tab closes, heartbeats stop and a serve-mode
// server shuts itself down after the grace window.
async function heartbeat(){
  try{await fetch("/api/heartbeat",{method:"POST",headers:{"content-type":"application/json"},body:"{}"});}catch{}
}
heartbeat();
setInterval(heartbeat,4000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden)heartbeat();});

// Init
connect();loadSessions();loadChips();
</script>
