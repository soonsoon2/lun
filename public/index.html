<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>論 (lun)</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --bg-chat: #0c0c0f;
      --bg-bubble-user: #1e1b4b;
      --bg-bubble-ai: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-dim: #a1a1aa;
      --text-muted: #52525b;
      --kiro: #a78bfa;
      --claude: #fb923c;
      --copilot: #4ade80;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 18px; font-weight: 800; letter-spacing: -0.03em;
    }
    .header h1 span { color: var(--text-muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
    .header .status { display: flex; gap: 8px; align-items: center; }
    .header .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .dot.ready { background: var(--copilot); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
    .dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
    .dot.off { background: var(--text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* CHAT AREA */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 6px;
      background: var(--bg-chat);
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* MESSAGE ROWS */
    .msg-row {
      display: flex; gap: 10px; max-width: 720px;
      animation: fadeIn 0.25s ease;
    }
    .msg-row.user {
      align-self: flex-end; flex-direction: row-reverse;
    }
    .msg-row.ai {
      align-self: flex-start;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* AVATAR */
    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.kiro { background: rgba(167,139,250,0.15); color: var(--kiro); }
    .avatar.claude { background: rgba(251,146,60,0.15); color: var(--claude); }
    .avatar.copilot { background: rgba(74,222,128,0.15); color: var(--copilot); }
    .avatar.user { background: rgba(255,255,255,0.08); color: var(--text-dim); }

    /* BUBBLE */
    .bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
    .bubble-meta {
      font-size: 10px; color: var(--text-muted); padding: 0 4px;
      display: flex; gap: 6px; align-items: center;
    }
    .bubble-meta .name { font-weight: 700; text-transform: uppercase; }
    .bubble-meta .name.kiro { color: var(--kiro); }
    .bubble-meta .name.claude { color: var(--claude); }
    .bubble-meta .name.copilot { color: var(--copilot); }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.7; word-break: break-word;
      max-width: 560px;
    }
    .msg-row.user .bubble {
      background: var(--bg-bubble-user);
      border: 1px solid rgba(99,102,241,0.2);
      border-top-right-radius: 4px;
    }
    .msg-row.ai .bubble {
      background: var(--bg-bubble-ai);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }
    .bubble h2 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; }
    .bubble h3 { font-size: 13px; font-weight: 700; margin: 8px 0 3px; }
    .bubble strong { color: var(--text); }
    .bubble code {
      background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
      font-size: 12px; font-family: "SF Mono", "JetBrains Mono", monospace;
    }
    .bubble a { color: #60a5fa; text-decoration: underline; }
    .bubble ul, .bubble ol { padding-left: 16px; margin: 4px 0; }

    /* TYPING INDICATOR */
    .typing {
      display: inline-flex; gap: 4px; padding: 10px 14px;
      background: var(--bg-bubble-ai); border: 1px solid var(--border);
      border-radius: var(--radius); border-top-left-radius: 4px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
      animation: typingDot 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }

    /* INPUT */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      max-width: 720px; margin: 0 auto;
    }
    #user-input {
      flex: 1; background: var(--bg-bubble-ai); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; color: var(--text);
      font-size: 14px; font-family: inherit; resize: none;
      min-height: 44px; max-height: 200px; line-height: 1.5; outline: none;
    }
    #user-input:focus { border-color: var(--kiro); }
    #user-input:disabled { opacity: 0.3; }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 40px; height: 40px; border-radius: 12px; border: none;
      background: var(--kiro); color: #000; font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }

    /* WELCOME */
    .welcome {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; color: var(--text-muted);
    }
    .welcome .logo { font-size: 48px; font-weight: 900; letter-spacing: -0.05em; color: var(--text); }
    .welcome p { font-size: 13px; max-width: 320px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>論<span>lun — multi-agent discussion</span></h1>
    <div class="status">
      <div class="dot off" id="statusDot"></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="logo">論</div>
      <p>여러 AI 에이전트에게 동시에 질문하고<br>각자의 의견을 받아보세요.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="질문을 입력하세요..." rows="1"></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById("chatArea");
    const welcome = document.getElementById("welcome");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusDot = document.getElementById("statusDot");

    let ws = null;
    let isWaiting = false;
    let isComposing = false;

    // Provider colors/labels
    const PROVIDERS = {
      kiro: { label: "Kiro", avatar: "K" },
      claude: { label: "Claude", avatar: "C" },
      copilot: { label: "Copilot", avatar: "Co" },
    };

    // ============================================================
    // RENDERING
    // ============================================================
    function hideWelcome() {
      welcome.style.display = "none";
    }

    function addUserMessage(text) {
      hideWelcome();
      const row = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `
        <div class="avatar user">나</div>
        <div class="bubble-wrap">
          <div class="bubble">${escHtml(text)}</div>
        </div>
      `;
      chatArea.appendChild(row);
      scrollBottom();
    }

    function addTypingIndicator(provider) {
      hideWelcome();
      const id = `typing-${provider}`;
      if (document.getElementById(id)) return;

      const row = document.createElement("div");
      row.className = "msg-row ai";
      row.id = id;
      row.innerHTML = `
        <div class="avatar ${provider}">${PROVIDERS[provider]?.avatar || "?"}</div>
        <div class="bubble-wrap">
          <div class="bubble-meta"><span class="name ${provider}">${PROVIDERS[provider]?.label || provider}</span></div>
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      `;
      chatArea.appendChild(row);
      scrollBottom();
    }

    function removeTypingIndicator(provider) {
      const el = document.getElementById(`typing-${provider}`);
      if (el) el.remove();
    }

    function addAiMessage(provider, text, elapsed) {
      removeTypingIndicator(provider);
      hideWelcome();

      const row = document.createElement("div");
      row.className = "msg-row ai";
      const timeStr = elapsed ? `${elapsed}s` : "";
      row.innerHTML = `
        <div class="avatar ${provider}">${PROVIDERS[provider]?.avatar || "?"}</div>
        <div class="bubble-wrap">
          <div class="bubble-meta">
            <span class="name ${provider}">${PROVIDERS[provider]?.label || provider}</span>
            <span>${timeStr}</span>
          </div>
          <div class="bubble">${renderMarkdown(text || "(응답 없음)")}</div>
        </div>
      `;
      chatArea.appendChild(row);
      scrollBottom();
    }

    function scrollBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function renderMarkdown(text) {
      return text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^- (.+)$/gm, '• $1')
        .replace(/\n/g, '<br>');
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ============================================================
    // WEBSOCKET
    // ============================================================
    function connect() {
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: "start", provider: "all" }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case "ready":
            statusDot.className = "dot ready";
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            break;
          case "thinking":
            // All providers start thinking
            for (const pid of Object.keys(PROVIDERS)) {
              addTypingIndicator(pid);
            }
            break;
          case "provider-thinking":
            addTypingIndicator(msg.provider);
            break;
          case "provider-response":
            addAiMessage(msg.provider, msg.text, msg.elapsed);
            break;
          case "done":
            isWaiting = false;
            statusDot.className = "dot ready";
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            break;
          case "error":
            isWaiting = false;
            statusDot.className = "dot ready";
            input.disabled = false;
            sendBtn.disabled = false;
            break;
        }
      };

      ws.onclose = () => {
        statusDot.className = "dot off";
        // Reconnect after 2s
        setTimeout(connect, 2000);
      };
    }

    // ============================================================
    // INPUT
    // ============================================================
    function send() {
      if (isComposing || isWaiting) return;
      const text = input.value.trim();
      if (!text) return;

      addUserMessage(text);
      ws.send(JSON.stringify({ type: "message", text }));

      input.value = "";
      input.style.height = "44px";
      isWaiting = true;
      input.disabled = true;
      sendBtn.disabled = true;
      statusDot.className = "dot loading";
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("compositionstart", () => { isComposing = true; });
    input.addEventListener("compositionend", () => { isComposing = false; });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !isComposing) {
        e.preventDefault();
        send();
      }
    });
    input.addEventListener("input", () => {
      input.style.height = "44px";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    // INIT
    connect();
  </script>
</body>
</html>
